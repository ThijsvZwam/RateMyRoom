<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Leaderboard — RateMyRoom 🏆</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0d0d0d;
      --surface: #161616;
      --card: #1e1e1e;
      --border: #2a2a2a;
      --accent: #ff4d00;
      --accent2: #ffb347;
      --text: #f0ece4;
      --muted: #888;
      --green: #39e07a;
      --red: #ff4d4d;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 1rem 4rem;
      background-image: radial-gradient(ellipse 80% 50% at 50% -10%, #ff4d0022 0%, transparent 70%);
    }
    .ad-slot {
      width: 100%; max-width: 640px;
      margin: 0.75rem auto;
      background: #1a1a1a;
      border: 1px dashed #333;
      border-radius: 12px;
      height: 90px;
      display: flex; align-items: center; justify-content: center;
      color: #444; font-size: 0.75rem; letter-spacing: 0.1em;
    }
    header {
      text-align: center;
      padding: 2.5rem 1rem 1.2rem;
      width: 100%; max-width: 640px;
    }
    header h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(3rem, 10vw, 5rem);
      letter-spacing: 0.04em;
      line-height: 1;
      background: linear-gradient(135deg, #ff4d00, #ffb347 60%, #fff 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    header p { color: var(--muted); font-size: 0.9rem; margin-top: 0.3rem; }
    nav {
      display: flex; gap: 0.5rem; margin-bottom: 1.5rem;
    }
    nav a {
      padding: 0.45rem 1.1rem; border-radius: 999px;
      background: var(--card); border: 1px solid var(--border);
      color: var(--muted); text-decoration: none;
      font-size: 0.85rem; font-weight: 500; transition: all 0.2s;
    }
    nav a:hover, nav a.active { background: var(--accent); color: #fff; border-color: var(--accent); }
    /* STATS ROW */
    .stats-row {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 0.75rem; width: 100%; max-width: 640px; margin-bottom: 1.5rem;
    }
    .stat-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 14px; padding: 0.9rem; text-align: center;
    }
    .stat-card .val { font-family: 'Bebas Neue', sans-serif; font-size: 2rem;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .stat-card .lbl { color: var(--muted); font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.08em; }
    /* FILTER */
    .filter-row {
      display: flex; gap: 0.5rem; width: 100%; max-width: 640px; margin-bottom: 1rem;
      flex-wrap: wrap;
    }
    .filter-btn {
      padding: 0.35rem 0.9rem; border-radius: 999px;
      background: var(--card); border: 1px solid var(--border);
      color: var(--muted); font-size: 0.8rem; cursor: pointer;
      transition: all 0.2s;
    }
    .filter-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
    /* PODIUM */
    .podium {
      display: flex; align-items: flex-end; justify-content: center;
      gap: 0.75rem; width: 100%; max-width: 640px; margin-bottom: 1.5rem;
    }
    .podium-item {
      flex: 1; max-width: 180px; text-align: center; cursor: pointer;
      transition: transform 0.2s;
    }
    .podium-item:hover { transform: translateY(-4px); }
    .podium-thumb {
      width: 70px; height: 70px; border-radius: 50%; object-fit: cover;
      margin: 0 auto 0.5rem; background: var(--surface);
      display: flex; align-items: center; justify-content: center; font-size: 1.8rem;
      border: 3px solid transparent;
    }
    .podium-thumb img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
    .podium-item.p1 .podium-thumb { border-color: #ffd700; width: 84px; height: 84px; }
    .podium-item.p2 .podium-thumb { border-color: #c0c0c0; }
    .podium-item.p3 .podium-thumb { border-color: #cd7f32; }
    .podium-bar {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 12px 12px 0 0;
      display: flex; flex-direction: column; align-items: center;
      padding: 0.6rem 0.5rem 0.4rem;
    }
    .podium-item.p1 .podium-bar { padding-top: 1rem; border-color: #ffd70044; }
    .podium-item.p2 .podium-bar { padding-top: 0.7rem; border-color: #c0c0c044; }
    .podium-medal { font-size: 1.4rem; }
    .podium-nick { font-weight: 700; font-size: 0.82rem; margin-top: 0.2rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100%; }
    .podium-score {
      font-family: 'Bebas Neue', sans-serif; font-size: 1.6rem;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    /* LIST */
    .lb-section-title {
      width: 100%; max-width: 640px;
      font-family: 'Bebas Neue', sans-serif; font-size: 1.1rem;
      letter-spacing: 0.1em; color: var(--muted); margin-bottom: 0.6rem;
      text-transform: uppercase;
    }
    #leaderboard { list-style: none; width: 100%; max-width: 640px; display: flex; flex-direction: column; gap: 0.5rem; }
    .lb-entry {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 14px; padding: 0.85rem 1.1rem;
      display: flex; align-items: center; gap: 1rem;
      cursor: pointer; transition: all 0.2s; position: relative; overflow: hidden;
    }
    .lb-entry:hover { border-color: var(--accent); background: #1f1a17; transform: translateX(3px); }
    .lb-entry::before {
      content:''; position:absolute; left:0; top:0; bottom:0; width:3px;
      background:var(--accent); opacity:0; transition:opacity 0.2s;
    }
    .lb-entry:hover::before { opacity: 1; }
    .lb-rank { font-family:'Bebas Neue',sans-serif; font-size:1.4rem; color:var(--muted); min-width:2.2rem; }
    .lb-rank.gold { color:#ffd700; }
    .lb-rank.silver { color:#c0c0c0; }
    .lb-rank.bronze { color:#cd7f32; }
    .lb-thumb {
      width:50px; height:50px; border-radius:10px; object-fit:cover;
      background:var(--surface); flex-shrink:0;
      display:flex; align-items:center; justify-content:center; color:#444; font-size:1.3rem;
      overflow:hidden;
    }
    .lb-thumb img { width:100%; height:100%; object-fit:cover; }
    .lb-info { flex:1; min-width:0; }
    .lb-name { font-weight:700; font-size:0.92rem; margin-bottom:0.15rem; }
    .lb-snippet { font-size:0.78rem; color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .lb-meta { font-size:0.7rem; color:#555; margin-top:0.1rem; }
    .lb-score-badge {
      font-family:'Bebas Neue',sans-serif; font-size:1.6rem;
      background:linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
    }
    /* PAGINATION */
    .pagination {
      display:flex; gap:0.5rem; margin-top:1rem;
      width:100%; max-width:640px; justify-content:center;
    }
    .pagination button {
      background:var(--card); border:1px solid var(--border); color:var(--text);
      padding:0.45rem 1rem; border-radius:8px; cursor:pointer; font-size:0.85rem; transition:all 0.2s;
    }
    .pagination button:hover:not(:disabled) { border-color:var(--accent); color:var(--accent); }
    .pagination button:disabled { opacity:0.3; cursor:not-allowed; }
    /* MODAL */
    #modal-overlay {
      position:fixed; inset:0; background:#000b;
      display:none; align-items:center; justify-content:center;
      z-index:100; padding:1rem; backdrop-filter:blur(6px);
    }
    #modal-overlay.open { display:flex; }
    .modal {
      background:var(--card); border:1px solid var(--border);
      border-radius:20px; padding:1.8rem;
      width:100%; max-width:480px; max-height:90vh; overflow-y:auto;
      position:relative;
      animation: slideUp 0.25s ease;
    }
    @keyframes slideUp { from{transform:translateY(20px);opacity:0} to{transform:translateY(0);opacity:1} }
    .modal-close {
      position:absolute; top:1rem; right:1rem;
      background:var(--surface); border:1px solid var(--border);
      color:var(--muted); border-radius:50%; width:32px; height:32px;
      display:flex; align-items:center; justify-content:center;
      cursor:pointer; font-size:1rem; transition:all 0.2s;
    }
    .modal-close:hover { color:var(--text); border-color:var(--text); }
    .modal img { width:100%; border-radius:12px; object-fit:contain; max-height:260px; background:var(--surface); }
    .modal-nick { font-family:'Bebas Neue',sans-serif; font-size:1.5rem; margin-top:1rem; }
    .modal-score-big {
      font-family:'Bebas Neue',sans-serif; font-size:4rem; line-height:1;
      background:linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
    }
    .verdict-block { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:1rem 1.2rem; margin-bottom:0.75rem; }
    .verdict-block .label { font-size:0.72rem; text-transform:uppercase; letter-spacing:0.1em; color:var(--muted); margin-bottom:0.3rem; }
    .verdict-block.roast .label { color:var(--red); }
    .verdict-block.tip .label { color:var(--green); }
    .verdict-block p { font-size:0.95rem; line-height:1.55; }
    .flag-btn { font-size:0.75rem; color:#555; background:none; border:none; cursor:pointer; padding:0.2rem 0.4rem; border-radius:6px; transition:color 0.2s; }
    .flag-btn:hover { color:var(--red); }
    /* TOAST */
    #toast {
      position:fixed; bottom:1.5rem; left:50%; transform:translateX(-50%) translateY(80px);
      background:var(--card); border:1px solid var(--border);
      padding:0.7rem 1.4rem; border-radius:12px; font-size:0.9rem;
      transition:transform 0.3s ease; z-index:200; pointer-events:none;
    }
    #toast.show { transform:translateX(-50%) translateY(0); }
  </style>
</head>
<body>

  <div class="ad-slot">[ Advertisement — 728×90 ]</div>

  <header>
    <h1>Leaderboard</h1>
    <p>The most-rated rooms on the internet</p>
  </header>

  <nav>
    <a href="../index.html">🏠 Rate</a>
    <a href="lb.html" class="active">🏆 Leaderboard</a>
  </nav>

  <div class="stats-row" id="statsRow">
    <div class="stat-card"><div class="val" id="statTotal">—</div><div class="lbl">Rooms Rated</div></div>
    <div class="stat-card"><div class="val" id="statAvg">—</div><div class="lbl">Avg Score</div></div>
    <div class="stat-card"><div class="val" id="statTop">—</div><div class="lbl">Top Score</div></div>
  </div>

  <div class="filter-row">
    <button class="filter-btn active" data-sort="score">🔥 Top Rated</button>
    <button class="filter-btn" data-sort="recent">🕐 Latest</button>
  </div>

  <!-- TOP 3 PODIUM -->
  <div class="podium" id="podium" style="display:none;"></div>

  <div class="lb-section-title">#4 and beyond</div>
  <ul id="leaderboard"><li style="color:var(--muted);padding:1rem;text-align:center;">Loading...</li></ul>
  <div class="pagination">
    <button id="prevBtn" disabled>← Prev</button>
    <button id="nextBtn">Next →</button>
  </div>

  <div class="ad-slot" style="margin-top:1.5rem;">[ Advertisement — 300×250 ]</div>

  <!-- MODAL -->
  <div id="modal-overlay">
    <div class="modal">
      <button class="modal-close" id="modalClose">✕</button>
      <img id="modalImg" src="" alt="Room" />
      <div style="display:flex;align-items:baseline;gap:0.8rem;flex-wrap:wrap;margin-top:1rem;">
        <div class="modal-nick" id="modalNick">—</div>
        <div class="modal-score-big" id="modalScore">—</div>
        <span style="color:var(--muted);font-size:0.8rem;">/10</span>
      </div>
      <div class="verdict-block roast" style="margin-top:0.8rem;">
        <div class="label">🔥 Roast</div>
        <p id="modalRoast">—</p>
      </div>
      <div class="verdict-block tip" style="margin-top:0.5rem;">
        <div class="label">💡 Tip</div>
        <p id="modalTip">—</p>
      </div>
      <div style="margin-top:0.8rem;display:flex;justify-content:flex-end;">
        <button class="flag-btn" id="flagBtn">🚩 Report image</button>
      </div>
    </div>
  </div>

  <div id="toast">Message</div>

  <script>
    const SERVER = "https://ratemyroom.onrender.com";
    let allData = [], sorted = [], currentPage = 0, currentSort = "score";
    const PAGE_SIZE = 5;

    function showToast(msg) {
      const t = document.getElementById("toast");
      t.textContent = msg;
      t.classList.add("show");
      setTimeout(() => t.classList.remove("show"), 2800);
    }

    function escHtml(str) {
      return String(str).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
    }

async function fetchData() {
  const el = document.getElementById("leaderboard");
  el.innerHTML = '<li style="color:var(--muted);padding:1rem;text-align:center;">Loading...</li>';
  
  try {
    // We voegen de query parameter toe voor de server-side sortering (optioneel, maar sneller)
    const res = await fetch(`${SERVER}/leaderboard?sort=${currentSort}`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    
    allData = await res.json();
    updateStats();
    
    // Omdat de server al gesorteerde data stuurt, 
    // hoef je applySort() alleen nog te gebruiken voor de UI-afhandeling
    applySort(); 
  } catch(err) {
    el.innerHTML = `<li style="color:var(--red);padding:1rem;">Error: ${err.message}</li>`;
  }
}

    function updateStats() {
      document.getElementById("statTotal").textContent = allData.length;
      if (allData.length) {
        const avg = allData.reduce((s,e) => s + +e.score, 0) / allData.length;
        const top = Math.max(...allData.map(e => +e.score));
        document.getElementById("statAvg").textContent = avg.toFixed(1);
        document.getElementById("statTop").textContent = top.toFixed(1);
      }
    }

    function applySort() {
      if (currentSort === "score") {
        sorted = [...allData].sort((a,b) => +b.score - +a.score);
      } else {
        sorted = [...allData].sort((a,b) => (b.timestamp||0) - (a.timestamp||0));
      }
      currentPage = 0;
      renderPodium();
      renderList();
    }

    function renderPodium() {
      const top3 = sorted.slice(0, 3);
      if (top3.length < 1) { document.getElementById("podium").style.display = "none"; return; }
      const medals = ["🥇","🥈","🥉"];
      const classes = ["p1","p2","p3"];
      // Display order: 2nd, 1st, 3rd
      const order = top3.length >= 3 ? [1,0,2] : [0];
      const podiumEl = document.getElementById("podium");
      podiumEl.style.display = "flex";
      podiumEl.innerHTML = order.filter(i => top3[i]).map(i => {
        const e = top3[i];
        const thumb = e.image
          ? `<div class="podium-thumb ${classes[i] || ''}"><img src="${e.image}" /></div>`
          : `<div class="podium-thumb ${classes[i] || ''}">🏠</div>`;
        return `<div class="podium-item ${classes[i] || ''}" data-idx="${i}">
          ${thumb}
          <div class="podium-bar">
            <span class="podium-medal">${medals[i]}</span>
            <span class="podium-nick">${escHtml(e.nickname||"Anon")}</span>
            <span class="podium-score">${e.score}</span>
          </div>
        </div>`;
      }).join("");
      podiumEl.querySelectorAll(".podium-item").forEach(el => {
        el.addEventListener("click", () => openModal(sorted[+el.dataset.idx]));
      });
    }

    function renderList() {
      const el = document.getElementById("leaderboard");
      const start = currentPage * PAGE_SIZE + 3; // skip top 3 shown in podium
      const slice = sorted.slice(start, start + PAGE_SIZE);

      if (!slice.length && currentPage === 0) {
        el.innerHTML = '<li style="color:var(--muted);padding:1rem;text-align:center;">No entries yet!</li>';
        document.getElementById("prevBtn").disabled = true;
        document.getElementById("nextBtn").disabled = true;
        return;
      }

      const rankClass = (i) => i === 0 ? "gold" : i === 1 ? "silver" : i === 2 ? "bronze" : "";

      el.innerHTML = slice.map((entry, i) => {
        const globalRank = start + i;
        const nick = entry.nickname || "Anonymous";
        const time = entry.timestamp ? new Date(entry.timestamp).toLocaleDateString() : "";
        const thumb = entry.image
          ? `<div class="lb-thumb"><img src="${entry.image}" alt="room" /></div>`
          : `<div class="lb-thumb">🏠</div>`;
        return `<li class="lb-entry" data-idx="${globalRank}">
          <span class="lb-rank ${rankClass(globalRank)}">#${globalRank + 1}</span>
          ${thumb}
          <div class="lb-info">
            <div class="lb-name">${escHtml(nick)}</div>
            <div class="lb-snippet">${escHtml(entry.roast || "No roast")}</div>
            ${time ? `<div class="lb-meta">${time}</div>` : ""}
          </div>
          <span class="lb-score-badge">${entry.score}</span>
        </li>`;
      }).join("");

      el.querySelectorAll(".lb-entry").forEach(li => {
        li.addEventListener("click", () => openModal(sorted[+li.dataset.idx]));
      });

      document.getElementById("prevBtn").disabled = currentPage === 0;
      const maxPage = Math.ceil((sorted.length - 3) / PAGE_SIZE) - 1;
      document.getElementById("nextBtn").disabled = currentPage >= maxPage;
    }

    // SORT BUTTONS
    document.querySelectorAll(".filter-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        currentSort = btn.dataset.sort;
        applySort();
      });
    });

    document.getElementById("prevBtn").addEventListener("click", () => { if (currentPage > 0) { currentPage--; renderList(); } });
    document.getElementById("nextBtn").addEventListener("click", () => { currentPage++; renderList(); });

    // MODAL
    let currentModalId = null;

    function openModal(entry) {
      currentModalId = entry.id || null;
      document.getElementById("modalImg").src = entry.image || "";
      document.getElementById("modalImg").style.display = entry.image ? "block" : "none";
      document.getElementById("modalNick").textContent = entry.nickname || "Anonymous";
      document.getElementById("modalScore").textContent = entry.score;
      document.getElementById("modalRoast").textContent = entry.roast || "—";
      document.getElementById("modalTip").textContent = entry.tip || "—";
      document.getElementById("flagBtn").textContent = "🚩 Report image";
      document.getElementById("flagBtn").disabled = false;
      document.getElementById("modal-overlay").classList.add("open");
    }
    document.getElementById("modalClose").addEventListener("click", () => document.getElementById("modal-overlay").classList.remove("open"));
    document.getElementById("modal-overlay").addEventListener("click", (e) => {
      if (e.target === document.getElementById("modal-overlay"))
        document.getElementById("modal-overlay").classList.remove("open");
    });
    document.getElementById("flagBtn").addEventListener("click", async () => {
      if (!currentModalId) return;
      const btn = document.getElementById("flagBtn");
      btn.disabled = true;
      btn.textContent = "Reporting...";
      try {
        const res = await fetch(`${SERVER}/report`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ id: currentModalId, reason: "User reported" })
        });
        if (!res.ok) throw new Error();
        showToast("🚩 Reported — thanks!");
        document.getElementById("modal-overlay").classList.remove("open");
      } catch {
        btn.disabled = false;
        btn.textContent = "🚩 Report image";
        showToast("❌ Report failed, try again.");
      }
    });

    fetchData();
  </script>
</body>
</html>
